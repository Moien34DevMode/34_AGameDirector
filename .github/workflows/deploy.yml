name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Required one-time repository setup (only needs to be done once):
#
#   Repository → Settings → Pages
#     → Build and deployment
#       → Source: GitHub Actions   ← must be set to this, not "Deploy from branch"
#
# Without this setting the deploy job will always fail with
# "Deployment failed, try again later."
# ─────────────────────────────────────────────────────────────────────────────

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time.
# A queued run waits for the in-progress one to finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # LTS — avoids the Node 20 deprecation warning
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        # To set the GitHub Pages sub-path without editing vite.config.ts,
        # uncomment the lines below and replace the value:
        # env:
        #   VITE_BASE_PATH: /your-repo-name/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
