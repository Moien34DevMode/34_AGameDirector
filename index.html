<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#0a0a0a" />
        <meta
            name="description"
            content="Game Director Portfolio — interactive portfolio showcasing game direction, design, and philosophy."
        />

        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

        <!--
      GitHub Pages SPA redirect handler.
      When 404.html redirects a deep-link back to index.html, this script
      restores the original path before React Router mounts.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
        <script>
            (function (l) {
                if (l.search[1] === "/") {
                    var decoded = l.search
                        .slice(1)
                        .split("&")
                        .map(function (s) {
                            return s.replace(/~and~/g, "&");
                        });
                    window.history.replaceState(
                        null,
                        null,
                        decoded[0] +
                            (decoded.slice(1).join("")
                                ? "&" + decoded.slice(1).join("&")
                                : "") +
                            l.hash,
                    );
                }
            })(window.location);
        </script>

        <title>Game Director — Portfolio</title>
    </head>
    <body>
        <noscript>
            <p
                style="
                    font-family: sans-serif;
                    padding: 2rem;
                    text-align: center;
                "
            >
                This portfolio requires JavaScript. Please enable it in your
                browser settings.
            </p>
        </noscript>

        <div id="root"></div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
